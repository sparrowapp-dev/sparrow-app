<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth2 Callback</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .success {
            color: #28a745;
        }
        .error {
            color: #dc3545;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2 id="status">Processing authorization...</h2>
        <p id="message">Please wait while we complete the authorization.</p>
    </div>

    <script>
        (function() {
            const statusEl = document.getElementById('status');
            const messageEl = document.getElementById('message');

            try {
                // Parse the URL parameters
                const params = new URLSearchParams(window.location.search);
                const code = params.get('code');
                const error = params.get('error');
                const errorDescription = params.get('error_description');
                const state = params.get('state');

                if (error) {
                    // Authorization failed
                    statusEl.textContent = 'Authorization Failed';
                    statusEl.className = 'error';
                    messageEl.textContent = errorDescription || error;
                    
                    // Send error to parent window
                    if (window.opener) {
                        window.opener.postMessage({
                            type: 'oauth2_callback',
                            error: error,
                            error_description: errorDescription
                        }, window.location.origin);
                    }
                    
                    setTimeout(() => window.close(), 3000);
                } else if (code) {
                    // Authorization successful
                    statusEl.textContent = 'Authorization Successful';
                    statusEl.className = 'success';
                    messageEl.textContent = 'You can close this window now.';
                    
                    // Send code to parent window
                    if (window.opener) {
                        window.opener.postMessage({
                            type: 'oauth2_callback',
                            code: code,
                            state: state
                        }, window.location.origin);
                    }
                    
                    // Auto-close the popup
                    setTimeout(() => window.close(), 1500);
                } else {
                    // No code or error - unexpected state
                    statusEl.textContent = 'Unexpected Response';
                    statusEl.className = 'error';
                    messageEl.textContent = 'No authorization code or error received.';
                    
                    setTimeout(() => window.close(), 3000);
                }
            } catch (err) {
                statusEl.textContent = 'Error Processing Response';
                statusEl.className = 'error';
                messageEl.textContent = err.message;
                
                if (window.opener) {
                    window.opener.postMessage({
                        type: 'oauth2_callback',
                        error: 'processing_error',
                        error_description: err.message
                    }, window.location.origin);
                }
                
                setTimeout(() => window.close(), 3000);
            }
        })();
    </script>
</body>
</html>
