name: Convert MSI to MSIX

on:
  push:
    branches:
      - build/msix
  workflow_dispatch:

jobs:
  msix-build:
    runs-on: windows-2025
    environment: development

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Install winget
        shell: powershell
        run: |
            winget --version

      - name: Install MSIX Packaging Tool
        shell: powershell
        run: |
            # Install MSIX Packaging Tool from Microsoft Store
            winget install "MSIX Packaging Tool" --source msstore --accept-package-agreements --accept-source-agreements --silent
            
      - name: Verify MSIX Packaging Tool installation
        shell: powershell
        run: |
            # Ensure winget is available in PATH
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
            
            # Try to find winget executable
            $wingetPath = Get-Command winget -ErrorAction SilentlyContinue
            if (-not $wingetPath) {
                $wingetPath = Get-ChildItem "C:\Program Files\WindowsApps\Microsoft.DesktopAppInstaller_*_x64__8wekyb3d8bbwe\winget.exe" | Select-Object -First 1
                if ($wingetPath) {
                    $wingetExe = $wingetPath.FullName
                } else {
                    throw "Winget executable not found"
                }
            } else {
                $wingetExe = "winget"
            }
            
            # Check if MSIX Packaging Tool is installed
            $msixTool = & $wingetExe list "MSIX Packaging Tool"
            if ($msixTool -match "MSIX Packaging Tool") {
                Write-Host "✅ MSIX Packaging Tool installed successfully"
                Write-Host $msixTool
            } else {
                Write-Host "❌ MSIX Packaging Tool installation failed"
                Write-Host "Attempting to list all installed packages to debug:"
                & $wingetExe list
                exit 1
            }
            
      - name: Display installed tools
        shell: powershell
        run: |
            Write-Host "=== Winget Version ==="
            winget --version
            
            Write-Host "`n=== Installed Packages ==="
            winget list "MSIX Packaging Tool"
            Write-Host "Current directory: $(Get-Location)"

      - name: Print current location and replace XML placeholders
        shell: pwsh
        run: |
          Write-Host "=== Current Working Directory ===" -ForegroundColor Green
          Get-Location
          
          Write-Host "`n=== Current Directory Path ===" -ForegroundColor Green
          $currentPath = (Get-Location).Path
          Write-Host $currentPath
          
          Write-Host "`n=== Directory Contents ===" -ForegroundColor Green
          Get-ChildItem -Force
          
          Write-Host "`n=== XML File Processing ===" -ForegroundColor Green
          $xmlPath = ".github\workflows\msix_packaging\Sparrow_template.xml"
          
          if (Test-Path $xmlPath) {
              Write-Host "Found XML file at: $xmlPath" -ForegroundColor Yellow
              
              # Read the original XML content
              $xmlContent = Get-Content $xmlPath -Raw
              Write-Host "`n--- Original XML Content ---" -ForegroundColor Cyan
              Write-Host $xmlContent
              
              # Replace ${{github.workspace}} with actual current path
              $updatedContent = $xmlContent -replace '\$\{\{github\.workspace\}\}', $currentPath
              
              Write-Host "`n--- Updated XML Content ---" -ForegroundColor Green
              Write-Host $updatedContent
              
              # Optionally save the updated content to a new file
              $outputPath = ".github\workflows\msix_packaging\Sparrow_template.xml"
              $updatedContent | Out-File -FilePath $outputPath -Encoding UTF8
              Write-Host "`nUpdated XML saved to: $outputPath" -ForegroundColor Yellow
              
          } else {
              Write-Host "XML file not found at: $xmlPath" -ForegroundColor Red
              Write-Host "`nLooking for .github directory..." -ForegroundColor Yellow
              
              if (Test-Path ".github") {
                  Write-Host "Found .github directory. Contents:" -ForegroundColor Yellow
                  Get-ChildItem ".github" -Recurse -Force | Select-Object FullName
              } else {
                  Write-Host ".github directory not found in current location" -ForegroundColor Red
              }
          }

      - name: Print name and location
        shell: powershell
        run: |
          Write-Host "=== Current Working Directory ===" -ForegroundColor Green
          Get-Location
          
          Write-Host "`n=== Current Directory Path ===" -ForegroundColor Green
          $currentPath = (Get-Location).Path
          Write-Host $currentPath
          Write-Host "`n=== XML File Contents ===" -ForegroundColor Green
          $xmlPath = ".github\workflows\msix_packaging\Sparrow_template.xml"
          
          if (Test-Path $xmlPath) {
              Write-Host "Found XML file at: $xmlPath" -ForegroundColor Yellow
              Write-Host "`n--- XML Content ---" -ForegroundColor Cyan
              Get-Content $xmlPath -Raw
          } else {
              Write-Host "XML file not found at: $xmlPath" -ForegroundColor Red
              Write-Host "`nLooking for .github directory..." -ForegroundColor Yellow
              
              if (Test-Path ".github") {
                  Write-Host "Found .github directory. Contents:" -ForegroundColor Yellow
                  Get-ChildItem ".github" -Recurse -Force | Select-Object FullName
              } else {
                  Write-Host ".github directory not found in current location" -ForegroundColor Red
              }
          }

      - name: Create output directories
        shell: powershell
        run: |
            New-Item -ItemType Directory -Force -Path "msix-output"
            Write-Output "Created msix-output directory"
      
      - name: Check Windows version
        shell: powershell
        run: |
            Get-ComputerInfo | Select-Object WindowsProductName, WindowsVersion, OsBuildNumber
            Get-Location
            dir
            ls

      - name: Install MSIXPackagingDriver
        id: locate_tool
        run: |
            MsixPackagingTool.exe --version
            dism.exe /Online /add-capability /capabilityname:Msix.PackagingTool.Driver~~~~0.0.1.0
        shell: pwsh

      - name: Convert MSI to MSIX
        run: |
            Get-Location
            $templatePath = ".github\workflows\msix_packaging\Sparrow_template.xml"
            MsixPackagingTool.exe create-package --template $templatePath -v
        shell: pwsh

      - name: Find MSIX file
        id: find_msix
        shell: powershell
        run: |
          $msixFile = Get-ChildItem -Path ".github\workflows\msix_packaging" -Filter "*.msix" | Select-Object -First 1
          if ($msixFile) {
            Write-Host "Found MSIX file: $($msixFile.FullName)"
            echo "msix_path=$($msixFile.FullName)" >> $env:GITHUB_OUTPUT
            echo "msix_name=$($msixFile.Name)" >> $env:GITHUB_OUTPUT
            echo "msix_folder=$($msixFile.DirectoryName)" >> $env:GITHUB_OUTPUT
            
            # Also output just the filename without extension for signing
            $nameWithoutExt = [System.IO.Path]::GetFileNameWithoutExtension($msixFile.Name)
            echo "msix_name_no_ext=$nameWithoutExt" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "No MSIX file found!"
            exit 1
          }

      - name: Restore PFX certificate from base64
        run: |
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String("${{ vars.CERT_BASE64 }}"))
        shell: pwsh

      - name: Sign MSIX package manually
        shell: powershell
        run: |
          # Find the MSIX file
          $msixFile = Get-ChildItem -Path ".github\workflows\msix_packaging" -Filter "*.msix" | Select-Object -First 1
          
          if (-not $msixFile) {
            Write-Host "❌ No MSIX file found to sign!"
            exit 1
          }
          
          Write-Host "Found MSIX file to sign: $($msixFile.FullName)"
          
          # Try multiple SignTool locations
          $signToolPaths = @(
            "C:\Program Files (x86)\Microsoft SDKs\ClickOnce\SignTool\signtool.exe",
            "C:\Program Files (x86)\Windows Kits\10\App Certification Kit\signtool.exe"
          )
          
          # Also search dynamically for Windows Kits SignTool
          $dynamicPaths = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending
          if ($dynamicPaths) {
            $signToolPaths += $dynamicPaths[0].FullName
          }
          
          $signTool = $null
          foreach ($path in $signToolPaths) {
            if (Test-Path $path) {
              $signTool = $path
              Write-Host "✅ Found SignTool at: $signTool"
              break
            } else {
              Write-Host "❌ SignTool not found at: $path"
            }
          }
          
          if (-not $signTool) {
            Write-Host "❌ SignTool not found in any expected location!"
            Write-Host "Available directories:"
            Get-ChildItem "C:\Program Files (x86)\" -ErrorAction SilentlyContinue | Where-Object { $_.Name -like "*SDK*" -or $_.Name -like "*Windows*" } | Select-Object Name
            exit 1
          }
          
          # Set up certificate and signing parameters
          $certificatePath = "cert.pfx"
          $certificatePwd = '${{ vars.CERT_PASSWORD }}'
          $packageToSign = $msixFile.FullName
          
          Write-Host "Certificate Path: $certificatePath"
          Write-Host "Package to Sign: $packageToSign"
          Write-Host "Using SignTool: $signTool"
          
          # Sign using the Stack Overflow approach with proper syntax
          Write-Host "Executing signing command..."
          
          # Try with explicit parameter array for better control
          $signArgs = @(
            'sign',
            '/fd', 'sha256',
            '/a',
            '/f', $certificatePath,
            '/p', $certificatePwd,
            $packageToSign
          )
          
          Write-Host "Command: $signTool $($signArgs -join ' ')"
          
          & $signTool @signArgs
          
          if ($LASTEXITCODE -eq 0) {
            Write-Host "✅ MSIX file signed successfully"
          } else {
            Write-Host "❌ Failed to sign MSIX file (Exit code: $LASTEXITCODE)"
            
            # Debug: Show the exact command that was attempted
            Write-Host "Full command attempted: $signTool $($signArgs -join ' ')"
            exit 1
          }

      - name: Verify MSIX signature
        shell: powershell
        run: |
          $msixFile = Get-ChildItem -Path ".github\workflows\msix_packaging" -Filter "*.msix" | Select-Object -First 1
          
          if (-not $msixFile) {
            Write-Host "❌ No MSIX file found for verification!"
            exit 1
          }
          
          Write-Host "Verifying signature for: $($msixFile.FullName)"
          
          # Try to find signtool for verification
          $signTool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\" -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          
          if ($signTool) {
            Write-Host "Using SignTool at: $($signTool.FullName)"
            & $signTool.FullName verify /pa $msixFile.FullName
            
            if ($LASTEXITCODE -eq 0) {
              Write-Host "✅ MSIX signature verification successful"
            } else {
              Write-Host "❌ MSIX signature verification failed"
              exit 1
            }
          } else {
            Write-Host "⚠️ SignTool not found, skipping verification"
          }

      - name: Upload MSIX artifact  
        uses: actions/upload-artifact@v4
        with:
          name: msix-package
          path: ${{ steps.find_msix.outputs.msix_path }}