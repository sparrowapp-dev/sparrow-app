name: Convert MSI to MSIX

on:
  push:
    branches:
      - build/msix
  workflow_dispatch:

jobs:
  msix-build:
    runs-on: windows-2025
    environment: MSIXBuild

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Restore PFX certificate from base64
        run: |
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String("${{ vars.CERT_BASE64 }}"))
        shell: pwsh

      - name: Import certificate into local store
        run: |
          $securePassword = ConvertTo-SecureString -String "${{ vars.CERT_PASSWORD }}" -AsPlainText -Force
          Import-PfxCertificate -FilePath "cert.pfx" -CertStoreLocation "Cert:\CurrentUser\My" -Password $securePassword
        shell: pwsh

      - name: Install winget
        shell: powershell
        run: |
            winget --version

      - name: Install MSIX Packaging Tool
        shell: powershell
        run: |

            # Install MSIX Packaging Tool from Microsoft Store
            winget install "MSIX Packaging Tool" --source msstore --accept-package-agreements --accept-source-agreements --silent
            
      - name: Verify MSIX Packaging Tool installation
        shell: powershell
        run: |
            # Ensure winget is available in PATH
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
            
            # Try to find winget executable
            $wingetPath = Get-Command winget -ErrorAction SilentlyContinue
            if (-not $wingetPath) {
                $wingetPath = Get-ChildItem "C:\Program Files\WindowsApps\Microsoft.DesktopAppInstaller_*_x64__8wekyb3d8bbwe\winget.exe" | Select-Object -First 1
                if ($wingetPath) {
                    $wingetExe = $wingetPath.FullName
                } else {
                    throw "Winget executable not found"
                }
            } else {
                $wingetExe = "winget"
            }
            
            # Check if MSIX Packaging Tool is installed
            $msixTool = & $wingetExe list "MSIX Packaging Tool"
            if ($msixTool -match "MSIX Packaging Tool") {
                Write-Host "✅ MSIX Packaging Tool installed successfully"
                Write-Host $msixTool
            } else {
                Write-Host "❌ MSIX Packaging Tool installation failed"
                Write-Host "Attempting to list all installed packages to debug:"
                & $wingetExe list
                exit 1
            }
            
      - name: Display installed tools
        shell: powershell
        run: |
            Write-Host "=== Winget Version ==="
            winget --version
            
            Write-Host "`n=== Installed Packages ==="
            winget list "MSIX Packaging Tool"

      - name: Locate MSIXPackagingTool.exe
        id: locate_tool
        run: |
            $pkg = Get-ChildItem "C:\Program Files\WindowsApps" -Filter "MsixPackagingTool.exe" -Recurse | Select-Object -First 1
            if (-not $pkg) { Write-Error "MSIX Packaging Tool not found"; exit 1 }
            Write-Output "::set-output name=toolpath::$($pkg.FullName)"
        shell: pwsh

      - name: Convert MSI to MSIX
        run: |
            $msiPath = ".github\workflows\msix_packaging\Sparrow.msi"
            $templatePath = ".github\workflows\msix_packaging\Sparrow_template.xml"
            $outputPath = "output/TechdomeApp.msix"
            New-Item -ItemType Directory -Force -Path output
            & ${{ steps.locate_tool.outputs.toolpath }} create-package `
            --template $templatePath `
            --output $outputPath `
            --verbose
        shell: pwsh


      - name: Sign MSIX Package
        run: |
          $timestampUrl = "http://timestamp.digicert.com"
          $securePassword = ConvertTo-SecureString -String "${{ vars.CERT_PASSWORD }}" -AsPlainText -Force

          & "C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe" sign `
              /fd SHA256 /f "cert.pfx" /p "${{ vars.CERT_PASSWORD }}" `
              /tr $timestampUrl /td SHA256 `
              "output\TechdomeApp.msix"
        shell: pwsh

      - name: see the package
        run: |
         ls
         dir
        shell: pwsh

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: TechdomeApp-MSIX
          path: output/TechdomeApp.msix
