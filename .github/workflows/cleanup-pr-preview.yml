name: Cleanup PR Preview

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v2.0

      - name: Set Kubernetes context
        uses: Azure/k8s-set-context@v2
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Delete preview resources
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          
          echo "Cleaning up preview resources for PR #${PR_NUMBER}..."
          
          # Delete deployment, service, and ingress
          kubectl delete deployment sparrow-web-pr-${PR_NUMBER} \
            --namespace=sparrow-preview --ignore-not-found=true
          
          kubectl delete service sparrow-web-pr-${PR_NUMBER} \
            --namespace=sparrow-preview --ignore-not-found=true
          
          kubectl delete ingress sparrow-web-pr-${PR_NUMBER} \
            --namespace=sparrow-preview --ignore-not-found=true
          
          echo "✅ Preview resources cleaned up for PR #${PR_NUMBER}"
