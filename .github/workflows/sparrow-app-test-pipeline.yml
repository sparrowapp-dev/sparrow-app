# File: .github/workflows/sparrow-app-test-pipeline.yml
# This file is used to test the Sparrow App build and release process. Change this file to trigger the test pipeline for Sparrow App.
# It is triggered on push to the <branch_name> branch. Change the branch name to trigger the test pipeline.

name: Test release

on:
  push:
    # Trigger on push to the <branch_name> branch. Make sure to remove the branch name from the branches list below, once you are done testing.
    branches:
      - fix/mac-app-store-pipeline

  workflow_dispatch:

env:
  VITE_API_URL: ${{ vars.VITE_API_URL_DEV }}
  VITE_MIX_PANEL_TOKEN: ${{ vars.VITE_MIX_PANEL_TOKEN }}
  VITE_ENABLE_MIX_PANEL: ${{ vars.VITE_ENABLE_MIX_PANEL_DEV }}
  VITE_API_TIMEOUT: ${{ vars.VITE_API_TIMEOUT }}
  VITE_SPARROW_SUPPORT_EMAIL: ${{ vars.VITE_SPARROW_SUPPORT_EMAIL }}
  VITE_AUTH_URL: ${{ vars.VITE_AUTH_URL_DEV }}
  VITE_SPARROW_GITHUB: ${{ vars.VITE_SPARROW_GITHUB }}
  VITE_SPARROW_DOWNLOAD_LINK: ${{ vars.VITE_SPARROW_DOWNLOAD_LINK }}
  VITE_RELEASE_NOTES_PAT_TOKEN: ${{ secrets.VITE_RELEASE_NOTES_PAT_TOKEN }}
  VITE_RELEASE_NOTES_API: ${{ vars.VITE_RELEASE_NOTES_API }}
  VITE_AZURE_CDN_URL: ${{ vars.VITE_AZURE_CDN_URL }}
  VITE_AZURE_INSIGHTS_CONNECTION_STRING: ${{ vars.VITE_AZURE_INSIGHTS_CONNECTION_STRING }}
  VITE_OPENFEEDBACK_API: ${{ vars.VITE_OPENFEEDBACK_API }}
  VITE_OPENFEEDBACK_URL: ${{ vars.VITE_OPENFEEDBACK_URL }}
  VITE_OPENFEEDBACK_BOARD_ID: ${{ vars.VITE_OPENFEEDBACK_BOARD_ID }}
  VITE_BASE_URL: ${{ vars.VITE_BASE_URL }}
  VITE_SPARROW_LINKEDIN: ${{ vars.VITE_SPARROW_LINKEDIN }}
  VITE_WEB_SOCKET_IO_API_URL: ${{ vars.VITE_WEB_SOCKET_IO_API_URL }}
  VITE_SPARROW_DOCS: ${{ vars.VITE_SPARROW_DOCS }}
  VITE_SPARROW_AI_WEBSOCKET: ${{ vars.VITE_SPARROW_AI_WEBSOCKET }}
  VITE_APP_ENVIRONMENT_PATH: ${{ vars.VITE_APP_ENVIRONMENT_PATH }}
  VITE_OPENFEEDBACK_FEEDBACK_URL: ${{ vars.VITE_OPENFEEDBACK_FEEDBACK_URL }}
  VITE_SPARROW_WEB_APP_URL: ${{ vars.VITE_SPARROW_WEB_APP_URL }}
  VITE_MARKETING_URL: ${{ vars.VITE_MARKETING_URL }}
  VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
  VITE_APP_ENVIRONMENT: ${{ vars.VITE_APP_ENVIRONMENT }}
  VITE_POSTHOG_CONNECTION_API_KEY: ${{ vars.VITE_POSTHOG_CONNECTION_API_KEY }}
  VITE_POSTHOG_API_URL: ${{ vars.VITE_POSTHOG_API_URL }}
  VITE_SPARROW_ADMIN_URL: ${{ vars.VITE_SPARROW_ADMIN_URL }}
  ACTIONS_ALLOW_UNSECURE_COMMANDS: true
  CI: false

jobs:
  release_mac_app_store:
    runs-on: macos-latest
    environment: development
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust 1.82.0
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          rustup install 1.82.0
          rustup default 1.82.0
          rustup target add x86_64-apple-darwin

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: "22.12"

      - name: Increase Yarn network timeout
        run: yarn config set network-timeout 600000

      - name: Import Apple Certificates
        env:
          MAC_DISTRIBUTION_CERT: ${{ secrets.MAC_DISTRIBUTION_CERT }}
          MAC_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.MAC_DISTRIBUTION_CERT_PASSWORD }}
          MAC_INSTALLER_CERT: ${{ secrets.MAC_INSTALLER_CERT }}
          MAC_INSTALLER_CERT_PASSWORD: ${{ secrets.MAC_INSTALLER_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create and unlock keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 7200 -u build.keychain

          # Import Apple Distribution (codesigning) certificate
          echo "$MAC_DISTRIBUTION_CERT" | base64 --decode > DistributionCert.p12
          security import DistributionCert.p12 \
            -k build.keychain \
            -P "$MAC_DISTRIBUTION_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild \
            -T /usr/bin/productsign \
            -A

          # Import 3rd Party Mac Developer Installer certificate
          echo "$MAC_INSTALLER_CERT" | base64 --decode > InstallerCert.p12
          security import InstallerCert.p12 \
            -k build.keychain \
            -P "$MAC_INSTALLER_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild \
            -T /usr/bin/productsign \
            -A

          # CRITICAL: Configure keychain partition list to allow access without GUI
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Verify installation
          echo "=== All identities in keychain ==="
          security find-identity -v build.keychain
          echo "=== Codesigning identities ==="
          security find-identity -v -p codesigning build.keychain
          echo "=== Mac App Store identities ==="
          security find-identity -v -p macappstore build.keychain

      - name: Extract Certificate IDs
        id: extract-cert-ids
        run: |
          # Extract 3rd Party Mac Developer Application (codesigning) ID
          CODESIGN_ID=$(security find-identity -v -p codesigning build.keychain | grep "3rd Party Mac Developer Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$CODESIGN_ID" ]; then
            echo "::error::3rd Party Mac Developer Application certificate not found in keychain"
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi
          echo "CODESIGN_ID=$CODESIGN_ID" >> $GITHUB_ENV

          # Extract 3rd Party Mac Developer Installer ID
          INSTALLER_ID=$(security find-identity -v build.keychain | grep "3rd Party Mac Developer Installer" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$INSTALLER_ID" ]; then
            echo "::error::3rd Party Mac Developer Installer certificate not found in keychain"
            security find-identity -v build.keychain
            exit 1
          fi
          echo "INSTALLER_ID=$INSTALLER_ID" >> $GITHUB_ENV

          echo "Using codesign identity: $CODESIGN_ID"
          echo "Using installer identity: $INSTALLER_ID"

      - name: Build Tauri App
        run: |
          # Ensure keychain is unlocked
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          
          yarn cache clean
          yarn install
          yarn workspace @sparrow/desktop tauri build
        env:
          APPLE_SIGNING_IDENTITY: "${{ env.CODESIGN_ID }}" 
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.PR_GITHUB_TOKEN }}

      - name: Verify App Signature
        run: |
          APP_NAME="Sparrow"
          APP_PATH="apps/@sparrow-desktop/src-tauri/target/release/bundle/macos/${APP_NAME}.app"
          
          echo "Verifying app signature..."
          codesign -dvvv "$APP_PATH"
          
          echo "App will be rejected by spctl (expected for App Store builds)"
          spctl -a -t exec -vv "$APP_PATH" || true

      - name: Create unsigned pkg
        timeout-minutes: 10
        run: |
          set -euxo pipefail
          APP_NAME="Sparrow"
          BUNDLE_PATH="apps/@sparrow-desktop/src-tauri/target/release/bundle/macos/${APP_NAME}.app"
          PKG_PATH="apps/@sparrow-desktop/src-tauri/target/release/bundle/${APP_NAME}-unsigned.pkg"

          # Verify app bundle exists
          if [ ! -d "$BUNDLE_PATH" ]; then
            echo "::error::App bundle not found at $BUNDLE_PATH"
            exit 1
          fi

          echo "Creating unsigned package at $(date)"
          time productbuild \
            --component "$BUNDLE_PATH" /Applications \
            "$PKG_PATH"
          
          echo "Unsigned package created: $(ls -lh $PKG_PATH)"

      - name: Prepare Keychain for Signing
        timeout-minutes: 2
        run: |
          set -euxo pipefail
          
          # Ensure keychain is unlocked and accessible
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          
          # Reset partition list to ensure productsign can access
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          
          # Verify installer identity is still available
          echo "Verifying installer identity: ${{ env.INSTALLER_ID }}"
          security find-identity -v build.keychain | grep "${{ env.INSTALLER_ID }}" || {
            echo "Installer identity not found in keychain"
            security find-identity -v build.keychain
            exit 1
          }

      - name: Sign pkg
        timeout-minutes: 15
        run: |
          set -euxo pipefail
          
          UNSIGNED="apps/@sparrow-desktop/src-tauri/target/release/bundle/Sparrow-unsigned.pkg"
          SIGNED="apps/@sparrow-desktop/src-tauri/target/release/bundle/Sparrow.pkg"
          
          # Verify unsigned package exists
          if [ ! -f "$UNSIGNED" ]; then
            echo "::error::Unsigned package not found at $UNSIGNED"
            exit 1
          fi
          
          echo "Starting productsign at $(date)"
          echo "Unsigned package size: $(du -h "$UNSIGNED" | cut -f1)"
          echo "Using installer identity: ${{ env.INSTALLER_ID }}"
          
          # Sign with timeout and capture output
          time productsign --sign "${{ env.INSTALLER_ID }}" "$UNSIGNED" "$SIGNED" 2>&1 | tee productsign.log
          
          # Check if successful using PIPESTATUS
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "✅ productsign completed successfully at $(date)"
            echo "Signed package size: $(du -h "$SIGNED" | cut -f1)"
            
            # Verify the package signature
            echo "Verifying package signature..."
            pkgutil --check-signature "$SIGNED"
          else
            echo "❌ productsign failed at $(date)"
            echo "Last 50 lines of output:"
            tail -50 productsign.log
            exit 1
          fi

      - name: Upload to App Store Connect
        timeout-minutes: 15
        env:
          PKG_PATH: "apps/@sparrow-desktop/src-tauri/target/release/bundle/Sparrow.pkg"
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_ISSUER }}
        run: |
          set -euxo pipefail
          
          # Verify package exists and is signed
          if [ ! -f "$PKG_PATH" ]; then
            echo "::error::Package not found at $PKG_PATH"
            exit 1
          fi
          
          echo "Verifying package signature before upload..."
          pkgutil --check-signature "$PKG_PATH"
          
          # Setup API key
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          
          echo "Uploading to App Store Connect at $(date)..."
          echo "Package size: $(du -h "$PKG_PATH" | cut -f1)"
          
          # Upload with verbose output
          xcrun altool --upload-app -f "$PKG_PATH" -t macos \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER" \
            --verbose 2>&1 | tee upload.log
          
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "✅ Upload successful at $(date)"
            echo "The build will appear in TestFlight in 15-30 minutes"
          else
            echo "❌ Upload failed at $(date)"
            echo "Last 50 lines of upload log:"
            tail -50 upload.log
            exit 1
          fi
      
      - name: Post Mac App Store TestFlight Link to Teams
        if: success()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_INCOMING_WEBHOOK_URL }}
          TESTFLIGHT_URL: ${{ secrets.TESTFLIGHT_URL }}
        run: |
          curl -H "Content-Type: application/json" -d "{
            \"type\": \"message\",
            \"attachments\": [
              {
                \"contentType\": \"application/vnd.microsoft.card.adaptive\",
                \"content\": {
                  \"type\": \"AdaptiveCard\",
                  \"body\": [
                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"📲 New Mac App Store TestFlight Build Available\",
                      \"weight\": \"bolder\",
                      \"size\": \"large\",
                      \"color\": \"good\"
                    },
                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"A new macOS app store build is available for testing in TestFlight:\",
                      \"wrap\": true
                    },
                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"Build uploaded at: $(date)\",
                      \"wrap\": true
                    },
                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"TestFlight URL:\",
                      \"wrap\": true
                    },
                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"$TESTFLIGHT_URL\",
                      \"color\": \"accent\",
                      \"wrap\": true
                    }
                  ],
                  \"\$schema\": \"http://adaptivecards.io/schemas/adaptive-card.json\",
                  \"version\": \"1.2\",
                  \"msteams\": {
                    \"width\": \"Full\"
                  }
                }
              }
            ]
          }" "$TEAMS_WEBHOOK_URL"
        shell: bash