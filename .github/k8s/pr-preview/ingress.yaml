apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sparrow-web-preview-pr-${PR_NUMBER}
  namespace: sparrow-dev
  labels:
    app: sparrow-web-preview
    pr: "${PR_NUMBER}"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  tls:
  - hosts:
    - pr-${PR_NUMBER}.preview.sparrowapp.dev
    secretName: preview-pr-${PR_NUMBER}-tls
  rules:
  - host: pr-${PR_NUMBER}.preview.sparrowapp.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sparrow-web-preview-pr-${PR_NUMBER}
            port:
              number: 80